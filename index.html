<!DOCTYPE html>
<html>
  <head>
    <title>Cookie Test</title>
  </head>
  <body>
    <h1>Cookie Test</h1>
    <p>Cookie value:</p>
    <p id="cookieValue"></p>
    
    <script>
      // Function to get the value of a cookie by name
      function getCookie(name) {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
          const cookie = cookies[i].trim();
          if (cookie.startsWith(name + '=')) {
            return cookie.substring(name.length + 1);
          }
        }
        return null;
      }
      
      // Get the value of the testCookie cookie
      const testCookieValue = getCookie('testCookie');
      
      // Display the value of the testCookie cookie
      if (testCookieValue) {
        document.getElementById("cookieValue").innerHTML = testCookieValue;
      } else {
        document.getElementById("cookieValue").innerHTML = "Cookie not found";
      }
    </script>
    
  </body>
</html>
